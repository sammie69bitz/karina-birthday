<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom — Dating App</title>
  <style>
    :root { --bg:#0f1020; --card:#1a1c35; --text:#f8f8ff; --muted:#b8bbd6; --brand:#ff4d8d; --brand2:#6f7bff; --ok:#27c17e; --no:#ff5d5d; }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,sans-serif;background:linear-gradient(180deg,#11142c,#0a0b18);color:var(--text)}
    .app{max-width:960px;margin:0 auto;padding:16px}
    .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .logo{font-weight:800;font-size:1.6rem;background:linear-gradient(90deg,var(--brand),#ff9d68);-webkit-background-clip:text;color:transparent}
    .tabs{display:flex;gap:8px;margin:14px 0 20px}
    button{border:0;border-radius:10px;padding:10px 14px;font-weight:600;cursor:pointer}
    .tab{background:#24284e;color:#d7dbff}.tab.active{background:var(--brand2);color:white}
    .card-stack{position:relative;height:520px}
    .profile-card{position:absolute;inset:0;background:var(--card);border-radius:18px;overflow:hidden;box-shadow:0 10px 40px #0006;display:flex;flex-direction:column;touch-action:none}
    .profile-card img{width:100%;height:65%;object-fit:cover}
    .content{padding:16px}.name{font-size:1.6rem;font-weight:800}.bio{color:var(--muted);line-height:1.4}
    .tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.tag{font-size:.8rem;padding:4px 8px;border-radius:999px;background:#2c305a;color:#dbe0ff}
    .actions{display:flex;justify-content:center;gap:20px;margin-top:18px}
    .round{width:62px;height:62px;border-radius:50%;font-size:1.4rem}.dislike{background:var(--no)}.like{background:var(--ok)}
    .pill{display:inline-block;padding:6px 10px;background:#22264a;border-radius:999px;color:#cfd4ff}
    .panel{background:#171933;border-radius:14px;padding:14px}
    .list{display:grid;gap:10px}
    .match,.chat{display:flex;align-items:center;gap:10px;padding:10px;background:#22264a;border-radius:12px}
    .avatar{width:48px;height:48px;border-radius:50%;object-fit:cover}
    .row{display:flex;justify-content:space-between;align-items:center;gap:10px}
    input,textarea{width:100%;background:#0f1230;color:white;border:1px solid #3a3f6a;border-radius:8px;padding:8px;margin-top:6px}
    .small{font-size:.9rem;color:var(--muted)} .hidden{display:none}
    @media (max-width:640px){.card-stack{height:500px}}
  </style>
</head>
<body>
  <div class="app">
    <div class="top"><div class="logo">Bloom</div><span class="pill" id="status">0 matches</span></div>
    <div class="tabs">
      <button class="tab active" data-view="discover">Discover</button>
      <button class="tab" data-view="matches">Matches</button>
      <button class="tab" data-view="chats">Chats</button>
      <button class="tab" data-view="profile">My Profile</button>
    </div>

    <section id="discover" class="view">
      <div class="card-stack" id="cardStack"></div>
      <div class="actions">
        <button class="round dislike" id="btnNo">✕</button>
        <button class="round like" id="btnYes">❤</button>
      </div>
      <p class="small">Swipe left/right or use buttons.</p>
    </section>

    <section id="matches" class="view hidden"><div class="panel"><h3>Your Matches</h3><div class="list" id="matchList"></div></div></section>
    <section id="chats" class="view hidden"><div class="panel"><h3>Messages</h3><div class="list" id="chatList"></div></div></section>
    <section id="profile" class="view hidden"><div class="panel"><h3>Profile</h3><div class="row"><div style="flex:1"><label>Name<input id="myName"></label><label>Bio<textarea id="myBio" rows="3"></textarea></label></div></div><button id="saveProfile" style="margin-top:10px;background:var(--brand);color:white">Save</button></div></section>
  </div>

<script>
const seedProfiles=[
{id:1,name:'Maya, 27',bio:'Photographer, sunrise hikes, ramen hunter.',tags:['Outdoors','Art'],img:'https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=900&auto=format&fit=crop'},
{id:2,name:'Jordan, 29',bio:'Startup nerd, loves bookstores and espresso.',tags:['Coffee','Tech'],img:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=900&auto=format&fit=crop'},
{id:3,name:'Sofia, 25',bio:'Pilates, beach days, and spontaneous trips.',tags:['Travel','Fitness'],img:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=900&auto=format&fit=crop'},
{id:4,name:'Noah, 30',bio:'Chef by day, guitarist by night.',tags:['Music','Food'],img:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=900&auto=format&fit=crop'},
{id:5,name:'Elena, 26',bio:'Dog mom. Fantasy books. Terrible at bowling.',tags:['Dogs','Books'],img:'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=900&auto=format&fit=crop'}
];
const storeKey='bloom_state_v1';
const defaultState={queue:[...seedProfiles],liked:[],disliked:[],matches:[],chats:{},me:{name:'',bio:''}};
let state=JSON.parse(localStorage.getItem(storeKey)||'null')||defaultState;
if(!state.queue.length && !state.liked.length && !state.disliked.length){state={...defaultState,queue:[...seedProfiles]};}
const save=()=>localStorage.setItem(storeKey,JSON.stringify(state));
const el=id=>document.getElementById(id);
function renderStatus(){el('status').textContent=`${state.matches.length} matches`;}
function profileCard(p,idx){
  const d=document.createElement('div');d.className='profile-card';d.style.transform=`translateY(${idx*6}px) scale(${1-idx*0.02})`;
  d.innerHTML=`<img src="${p.img}" alt="${p.name}"><div class="content"><div class="name">${p.name}</div><div class="bio">${p.bio}</div><div class="tags">${p.tags.map(t=>`<span class='tag'>${t}</span>`).join('')}</div></div>`;
  setupSwipe(d,p.id);return d;
}
function renderDiscover(){const stack=el('cardStack');stack.innerHTML='';state.queue.slice(0,3).reverse().forEach((p,i)=>stack.appendChild(profileCard(p,i)));if(!state.queue.length)stack.innerHTML='<div class="panel">No more people nearby. Check matches!</div>';}
function likeTop(){if(!state.queue.length)return;const p=state.queue.shift();state.liked.push(p);if(Math.random()<0.65){state.matches.push(p);if(!state.chats[p.id])state.chats[p.id]=[{from:'them',text:'Hey! We matched on Bloom 🌸'}];}save();renderAll();}
function nopeTop(){if(!state.queue.length)return;state.disliked.push(state.queue.shift());save();renderAll();}
function renderMatches(){const m=el('matchList');m.innerHTML='';if(!state.matches.length){m.innerHTML='<p class="small">No matches yet. Keep swiping!</p>';return;}state.matches.forEach(p=>{const d=document.createElement('div');d.className='match';d.innerHTML=`<img class="avatar" src="${p.img}"><div><strong>${p.name}</strong><div class='small'>Matched recently</div></div>`;m.appendChild(d);});}
function renderChats(){const c=el('chatList');c.innerHTML='';if(!state.matches.length){c.innerHTML='<p class="small">No conversations yet.</p>';return;}state.matches.forEach(p=>{const msgs=state.chats[p.id]||[];const last=msgs[msgs.length-1]?.text||'Say hi!';const d=document.createElement('div');d.className='chat';d.innerHTML=`<img class='avatar' src='${p.img}'><div style='flex:1'><strong>${p.name}</strong><div class='small'>${last}</div></div><button data-id='${p.id}'>Message</button>`;d.querySelector('button').onclick=()=>{const txt=prompt(`Message ${p.name.split(',')[0]}:`);if(txt){msgs.push({from:'me',text:txt});state.chats[p.id]=msgs;save();renderChats();}};c.appendChild(d);});}
function renderProfile(){el('myName').value=state.me.name;el('myBio').value=state.me.bio;}
function renderAll(){renderStatus();renderDiscover();renderMatches();renderChats();renderProfile();}
function setupTabs(){document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');const v=b.dataset.view;document.querySelectorAll('.view').forEach(sec=>sec.classList.toggle('hidden',sec.id!==v));});}
function setupSwipe(card,id){let sx=0,dx=0,down=false;card.onpointerdown=e=>{down=true;sx=e.clientX;card.setPointerCapture(e.pointerId)};card.onpointermove=e=>{if(!down)return;dx=e.clientX-sx;card.style.transform=`translate(${dx}px,0) rotate(${dx/14}deg)`;};card.onpointerup=()=>{down=false;if(dx>120)likeTop();else if(dx<-120)nopeTop();else{card.style.transform='';renderDiscover();}dx=0;};}
el('btnYes').onclick=likeTop;el('btnNo').onclick=nopeTop;el('saveProfile').onclick=()=>{state.me={name:el('myName').value,bio:el('myBio').value};save();alert('Saved!');};
setupTabs();renderAll();
</script>
</body>
</html>
